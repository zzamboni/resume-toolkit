name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY || format('{0}/resume-toolkit', github.repository_owner) }}
  LOCAL_TEST_IMAGE: resume-toolkit:test-${{ github.sha }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image version
        id: version
        run: |
          declared_version="$(tr -d '[:space:]' < VERSION)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ "${version}" != "${declared_version}" ]]; then
              echo "Release tag ${version} does not match VERSION file ${declared_version}" >&2
              exit 1
            fi
          else
            version="${declared_version}"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Build test image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.LOCAL_TEST_IMAGE }}
          build-args: |
            VITA_TOOLKIT_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container integration tests
        run: tests/container/test_container.sh "${{ env.LOCAL_TEST_IMAGE }}"

      - name: Log in to Docker Hub
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push release image
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITA_TOOLKIT_VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./README.md
