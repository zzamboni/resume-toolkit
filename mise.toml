# -----------------------------------------------------------------------------
# Global tools / variables / paths
# -----------------------------------------------------------------------------
[tools]
python = "3.14.2"
uv = "latest"
watchexec = "latest"

[settings]
disable_tools = ["yarn"]

[env]
_.python.venv = { path = ".venv", create = true, uv_create_args = ["--seed"] }

[vars]
pipeline_docker_image = "zzamboni/vita-pipeline:latest"
port = "8008"

# -----------------------------------------------------------------------------
# User-facing tasks
# -----------------------------------------------------------------------------

[tasks.build]
description = "Run CV + publications pipeline"
alias = "pipeline"
usage = '''
arg "<resume>" help="JSONresume file"
arg "[bibfiles]" var=#true help="BibTeX files (optional)"
flag "--pubs-url <url>" help="Online publications URL for publications PDF footer"
flag "--out <dir>" help="Output directory"
'''
sources = [
  "scripts/run_pipeline.sh",
  "scripts/render_cv.sh",
  "scripts/render_typst_cv.py",
  "scripts/build_publications.py",
  "templates/publications.html.j2",
  "assets/profile/**/*",
  "assets/logos/**/*",
  "assets/fontawesome/**/*",
  "pubs-assets/**/*",
  "themes/jsonresume-theme-even/**/*",
  "*.json",
  "pubs-src/**/*.bib",
]
run = '''
#!/usr/bin/env bash
set -euo pipefail

args=()
if [[ -n "${usage_out:-}" ]]; then
  args+=(--out "${usage_out}")
fi
if [[ -n "${usage_pubs_url:-}" ]]; then
  args+=(--pubs-url "${usage_pubs_url}")
fi
args+=(--json "$usage_resume")
if [[ -n "${usage_bibfiles:-}" ]]; then
  read -r -a arr <<< "$usage_bibfiles"
  for f in "${arr[@]}"; do
    args+=(--bib "$f")
  done
fi

scripts/run_pipeline.sh "${args[@]}"
'''

[tasks.fetch-logos]
description = "Fetch company/education logos from JSON resume into /work assets"
usage = '''
arg "<resume>" help="JSONresume file"
flag "--overwrite" help="Overwrite existing logo files"
flag "--dry-run" help="Show what would be downloaded"
flag "--token <token>" help="Logo.dev publishable API key for logo access"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

workdir="${VITA_WORKDIR:-$PWD}"
resume="$usage_resume"
if [[ "$resume" != /* ]]; then
  resume="$workdir/$resume"
fi

logos_dir="$workdir/assets/logos"
mkdir -p "$logos_dir"

args=("$resume" "--logos-dir" "$logos_dir")
if [[ -n "${usage_overwrite:-}" ]]; then
  args+=("--overwrite")
fi
if [[ -n "${usage_dry_run:-}" ]]; then
  args+=("--dry-run")
fi
if [[ -n "${usage_token:-}" ]]; then
  args+=("--token" "${usage_token}")
fi

python scripts/fetch_company_logos.py "${args[@]}"
'''

[tasks.update-certs]
description = "Update certificates from credly"
usage = '''
arg "<username>" help="Credly username/profile slug"
arg "<resume>" help="JSONresume file to update"
flag "--include-expired" help="Include expired certificates"
flag "--include-non-cert-badges" help="Include all badges, even if not classified as certifications"
flag "--sort <sort>" {
     help "Sorting for Credly-derived certificates"
     choices "date_desc" "date_asc" "name"
     default "date_desc"
}
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

workdir="${VITA_WORKDIR:-$PWD}"
resume="$usage_resume"
if [[ "$resume" != /* ]]; then
  resume="$workdir/$resume"
fi

args=()
if [[ -n "${usage_include_expired:-}" ]]; then
  args+=(--include-expired)
fi
if [[ -n "${usage_include_non_cert_badges:-}" ]]; then
  args+=(--include-non-cert-badges)
fi
if [[ -n "${usage_sort:-}" ]]; then
  args+=(--sort "${usage_sort}")
fi

args+=("$usage_username" "$resume")

cd "$VITA_TOOLKIT_ROOT"
python scripts/update-certs-from-credly.py "${args[@]}"
'''

# -----------------------------------------------------------------------------
# Internal/helper tasks
# -----------------------------------------------------------------------------

[tasks.bootstrap]
description = "Install/update project dependencies (Python + npm)"
hide = true
sources = ["requirements.txt", "package-lock.json", "package.json", "mise.toml"]
run = '''
#!/usr/bin/env bash
set -euo pipefail

uv pip sync requirements.txt

if [ -f package-lock.json ]; then npm ci; else npm install; fi

if [ -f themes/jsonresume-theme-even/package-lock.json ]; then
  (cd themes/jsonresume-theme-even && npm ci)
else
  (cd themes/jsonresume-theme-even && npm install)
fi
'''

[tasks.pipeline-devcontainer]
description = "Run pipeline inside devcontainer"
hide = true
usage = '''
arg "<resume>" help="JSONresume file"
arg "[bibfiles]" var=#true help="BibTeX files (optional)"
flag "--pubs-url <url>" help="Online publications URL for publications PDF footer"
flag "--out <dir>" help="Output directory"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

args=("$usage_resume")
if [[ -n "${usage_bibfiles:-}" ]]; then
  read -r -a arr <<< "$usage_bibfiles"
  for f in "${arr[@]}"; do
    args+=("$f")
  done
fi
if [[ -n "${usage_out:-}" ]]; then
  args+=(--out "$usage_out")
fi
if [[ -n "${usage_pubs_url:-}" ]]; then
  args+=(--pubs-url "$usage_pubs_url")
fi

devcontainer exec --workspace-folder . -- mise run pipeline "${args[@]}"
'''

[tasks.pipeline-image-build]
description = "Build standalone pipeline Docker image"
hide = true
sources = [
  "Dockerfile",
  ".dockerignore",
  "package.json",
  "package-lock.json",
  "requirements.txt",
  "scripts/**/*",
  "templates/publications.html.j2",
  "pubs-assets/**/*",
  "assets/**/*",
  "themes/jsonresume-theme-even/**/*",
  "docker/entrypoint.sh",
  "docker/run-container.sh",
]
run = '''
#!/usr/bin/env bash
set -euo pipefail
docker build --build-arg PREWARM_CACHE=1 -t "{{vars.pipeline_docker_image}}" .
'''

[tasks.docker-shell]
description = "Open an interactive shell in the Docker image"
alias = ["bash", "docker-bash"]
hide = true
run = "docker/run-container.sh bash"

[tasks.pipeline-docker]
description = "Run pipeline through standalone Docker image"
hide = true
usage = '''
arg "<resume>" help="JSONresume file"
arg "[bibfiles]" var=#true help="BibTeX files (optional)"
flag "--pubs-url <url>" help="Online publications URL for publications PDF footer"
flag "--out <dir>" help="Output directory"
flag "--watch" help="Watch the command given"
flag "--serve" help="Serve output directory and run in watch mode"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

args=("$usage_resume")
if [[ -n "${usage_bibfiles:-}" ]]; then
  read -r -a arr <<< "$usage_bibfiles"
  for f in "${arr[@]}"; do
    args+=("$f")
  done
fi
if [[ -n "${usage_out:-}" ]]; then
  args+=(--out "$usage_out")
fi
if [[ -n "${usage_pubs_url:-}" ]]; then
  args+=(--pubs-url "$usage_pubs_url")
fi
if [[ -n "${usage_watch:-}" ]]; then
  args+=(--watch)
fi
if [[ -n "${usage_serve:-}" ]]; then
  args+=(--serve)
fi

if [[ -n "${usage_serve:-}" ]]; then
  VITA_PIPELINE_IMAGE="{{vars.pipeline_docker_image}}" \
  VITA_PIPELINE_PORT_MAP="{{vars.port}}:{{vars.port}}" \
    docker/run-container.sh build "${args[@]}"
else
  VITA_PIPELINE_IMAGE="{{vars.pipeline_docker_image}}" \
    docker/run-container.sh build "${args[@]}"
fi
'''
