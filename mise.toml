# -----------------------------------------------------------------------------
# Global tools / variables / paths
# -----------------------------------------------------------------------------
[tools]
python = "3.14.2"
uv = "latest"
watchexec = "latest"

[settings]
disable_tools = ["yarn"]

[env]
_.python.venv = { path = ".venv", create = true, uv_create_args = ["--seed"] }

[vars]
pipeline_docker_image = "zzamboni/resume-toolkit:latest"
port = "8008"

# -----------------------------------------------------------------------------
# User-facing tasks
# -----------------------------------------------------------------------------

[tasks.build]
description = "Run CV + publications pipeline"
alias = "pipeline"
usage = '''
arg "<resume>" help="JSONresume file"
arg "[bibfiles]" var=#true help="BibTeX files (optional)"
flag "--pubs-url <url>" help="Online publications URL for publications PDF footer"
flag "--out <dir>" help="Output directory"
'''
sources = [
  "scripts/run_pipeline.sh",
  "scripts/render_cv.sh",
  "scripts/render_typst_cv.py",
  "scripts/build_publications.py",
  "scripts/render_fa_icon.mjs",
  "templates/publications.html.j2",
  "assets/profile/**/*",
  "assets/logos/**/*",
  "pubs-assets/**/*",
  "themes/jsonresume-theme-even/**/*",
  "*.json",
]
run = '''
#!/usr/bin/env bash
set -euo pipefail

args=()
if [[ -n "${usage_out:-}" ]]; then
  args+=(--out "${usage_out}")
fi
if [[ -n "${usage_pubs_url:-}" ]]; then
  args+=(--pubs-url "${usage_pubs_url}")
fi
args+=(--json "$usage_resume")
if [[ -n "${usage_bibfiles:-}" ]]; then
  read -r -a arr <<< "$usage_bibfiles"
  for f in "${arr[@]}"; do
    args+=(--bib "$f")
  done
fi

scripts/run_pipeline.sh "${args[@]}"
'''

[tasks.fetch-logos]
description = "Fetch company/education logos from JSON resume into /work assets"
usage = '''
arg "<resume>" help="JSONresume file"
flag "--overwrite" help="Overwrite existing logo files"
flag "--dry-run" help="Show what would be downloaded"
flag "--token <token>" help="Logo.dev publishable API key for logo access"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

workdir="${VITA_WORKDIR:-$PWD}"
resume="$usage_resume"
if [[ "$resume" != /* ]]; then
  resume="$workdir/$resume"
fi

logos_dir="$workdir/assets/logos"
mkdir -p "$logos_dir"

args=("$resume" "--logos-dir" "$logos_dir")
if [[ -n "${usage_overwrite:-}" ]]; then
  args+=("--overwrite")
fi
if [[ -n "${usage_dry_run:-}" ]]; then
  args+=("--dry-run")
fi
if [[ -n "${usage_token:-}" ]]; then
  args+=("--token" "${usage_token}")
fi

python scripts/fetch_company_logos.py "${args[@]}"
'''

[tasks.update-certs]
description = "Update certificates from credly"
usage = '''
arg "<username>" help="Credly username/profile slug"
arg "<resume>" help="JSONresume file to update"
flag "--include-expired" help="Include expired certificates"
flag "--include-non-cert-badges" help="Include all badges, even if not classified as certifications"
flag "--sort <sort>" {
     help "Sorting for Credly-derived certificates (default: date_desc)"
     choices "date_desc" "date_asc" "name"
     default "date_desc"
}
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

workdir="${VITA_WORKDIR:-$PWD}"
resume="$usage_resume"
if [[ "$resume" != /* ]]; then
  resume="$workdir/$resume"
fi

args=()
if [[ -n "${usage_include_expired:-}" ]]; then
  args+=(--include-expired)
fi
if [[ -n "${usage_include_non_cert_badges:-}" ]]; then
  args+=(--include-non-cert-badges)
fi
if [[ -n "${usage_sort:-}" ]]; then
  args+=(--sort "${usage_sort}")
fi

args+=("$usage_username" "$resume")

cd "$VITA_TOOLKIT_ROOT"
python scripts/update-certs-from-credly.py "${args[@]}"
'''

[tasks.update-pub-numbers]
description = "Update publication reference numbers in JSON resume"
usage = '''
arg "<resume>" help="JSONresume file to update"
flag "--html <html>" help="Publications HTML file (defaults to build/<resume-stem>/vita/publications/index.html)"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

workdir="${VITA_WORKDIR:-$PWD}"
resume="$usage_resume"
if [[ "$resume" != /* ]]; then
  resume="$workdir/$resume"
fi

html="${usage_html:-}"
if [[ -z "$html" ]]; then
  stem="$(basename "$resume" .json)"
  html="$workdir/build/$stem/vita/publications/index.html"
elif [[ "$html" != /* ]]; then
  html="$workdir/$html"
fi

cd "$VITA_TOOLKIT_ROOT"
python scripts/update_pub_numbers.py --json "$resume" --html "$html"
'''

[tasks.update-inline-pubs]
description = "Update inline publications in JSON resume from selected BibTeX entries"
usage = '''
arg "<resume>" help="JSONresume file to update"
arg "[bibfiles]" var=#true help="BibTeX files (optional; defaults to bibfiles in publications[] entry)"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

workdir="${VITA_WORKDIR:-$PWD}"
resume="$usage_resume"
if [[ "$resume" != /* ]]; then
  resume="$workdir/$resume"
fi

args=(--json "$resume")
if [[ -n "${usage_bibfiles:-}" ]]; then
  read -r -a arr <<< "$usage_bibfiles"
  for bib in "${arr[@]}"; do
    if [[ "$bib" != /* ]]; then
      bib="$workdir/$bib"
    fi
    args+=(--bib "$bib")
  done
fi

cd "$VITA_TOOLKIT_ROOT"
python scripts/update_inline_pubs.py "${args[@]}"
'''

[tasks.release]
description = "Bump VERSION, create release tag, and push tags"
usage = '''
arg "<version>" help="Release version (for example: 0.2.2)"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

version="$usage_version"
tag="v$version"

if [[ ! -f VERSION ]]; then
  echo "VERSION file not found" >&2
  exit 1
fi

printf '%s\n' "$version" > VERSION

git add VERSION
if git diff --cached --quiet -- VERSION; then
  echo "VERSION is already $version; nothing to commit" >&2
  exit 1
fi

git commit -m "Release $tag" -- VERSION
git tag -a "$tag" -m "Release $tag"
git push
git push --tags
'''

# -----------------------------------------------------------------------------
# Internal/helper tasks
# -----------------------------------------------------------------------------

[tasks.bootstrap]
description = "Install/update project dependencies (Python + npm)"
hide = true
sources = ["requirements.txt", "package-lock.json", "package.json", "mise.toml"]
run = '''
#!/usr/bin/env bash
set -euo pipefail

uv pip sync requirements.txt

# Build the local theme first so the root `file:` dependency includes dist/.
(
  cd themes/jsonresume-theme-even
  if [ -f package-lock.json ]; then
    npm ci --ignore-scripts
  else
    npm install --ignore-scripts
  fi
  # Force-enable scripts here so prebuild generates schema.d.ts.
  NPM_CONFIG_IGNORE_SCRIPTS=false npm run build
)

if [ -f package-lock.json ]; then npm ci --ignore-scripts; else npm install --ignore-scripts; fi
'''

[tasks.toolkit-image-build]
description = "Build standalone toolkit Docker image"
hide = true
usage = '''
flag "--no-cache" help="Build Docker image without layer cache"
flag "--no-cache-filter <filter>" var=#true help="Do not use cache for specific build stage(s); repeatable"
flag "--no-test" help="Do not run toolkit tests after build"
'''
sources = [
  "Dockerfile",
  ".dockerignore",
  "package.json",
  "package-lock.json",
  "requirements.txt",
  "scripts/*",
  "templates/*",
  "pubs-assets/**/*",
  "assets/**/*",
  "themes/jsonresume-theme-even/**/*",
  "docker/*",
]
run = '''
#!/usr/bin/env bash
set -euo pipefail
docker_args=()
if [[ -n "${usage_no_cache:-}" ]]; then
  docker_args+=(--no-cache)
fi
if [[ -n "${usage_no_cache_filter:-}" ]]; then
  read -r -a cache_filters <<< "$usage_no_cache_filter"
  for filter in "${cache_filters[@]}"; do
    docker_args+=(--no-cache-filter "$filter")
  done
fi

echo docker build "${docker_args[@]}" --build-arg PREWARM_CACHE=1 -t "{{vars.pipeline_docker_image}}" .
docker build "${docker_args[@]}" --build-arg PREWARM_CACHE=1 -t "{{vars.pipeline_docker_image}}" .
if [[ -z "${usage_no_test:-}" ]]; then
   mise test-toolkit
fi
'''

[tasks.test-toolkit]
description = "Run toolkit integration tests"
hide = true
usage = '''
arg "[image]" help="Docker image to test" default="{{vars.pipeline_docker_image}}"
'''
run = "tests/container/test_container.sh \"$usage_image\""
